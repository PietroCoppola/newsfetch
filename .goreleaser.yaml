# GoReleaser config for newsfetch.
#
# Cuts a release on every `v*` tag pushed to GitHub. Cross-compiles for
# darwin/amd64, darwin/arm64, linux/amd64, linux/arm64, plus windows/amd64
# as best-effort (we don't officially support Windows, but cross-compilation
# is free and a curious user can grab the binary).
#
# Run `goreleaser check` locally to validate the config; `goreleaser release
# --snapshot --clean` builds the artifacts without publishing for smoke
# testing.

version: 2

project_name: newsfetch

before:
  hooks:
    - go mod tidy

builds:
  - id: newsfetch
    main: ./cmd/newsfetch
    binary: newsfetch
    env:
      - CGO_ENABLED=0
    # Unix-only by intent. The fork-detach refresh in cmd/newsfetch/main.go
    # uses syscall.SysProcAttr.Setpgid, which doesn't exist in Windows'
    # syscall package — cross-compiling for Windows fails at build time.
    # The brief originally listed Windows as best-effort cross-compile;
    # the v0.4.6-pre1 pipeline run (release log #66275048315) made it
    # clear that "best-effort" wasn't honest: the cross-compile actively
    # fails. Build-tagging the Setpgid path Unix-only with a Windows
    # stub would produce a Windows binary whose async refresh doesn't
    # work, plus ongoing maintenance — not worth it for hypothetical
    # Windows users when WSL covers most Windows-on-dev cases. Revisit
    # only if a real Windows user asks.
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      # -s -w strip debug symbols (smaller binaries; we have no use for
      # in-binary debugging on a release build).
      # The -X flag injects the release version into defaults.Version.
      # See internal/defaults/defaults.go for the var declaration.
      - -s
      - -w
      - -X github.com/PietroCoppola/newsfetch/internal/defaults.Version={{.Version}}

archives:
  - id: default
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - LICENSE
      - README.md

checksum:
  name_template: 'SHA256SUMS'
  algorithm: sha256

snapshot:
  # Snapshot builds (goreleaser release --snapshot) get a synthetic version
  # so they don't collide with real releases. Distinguishable by suffix.
  version_template: '{{ incpatch .Version }}-snapshot-{{ .ShortCommit }}'

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'
      - 'merge conflict'
      - Merge pull request
      - Merge remote-tracking branch
      - Merge branch

homebrew_casks:
  - name: newsfetch
    # binaries defaults to [newsfetch] (the cask name). Leave it
    # auto-inferred — explicit binaries: [newsfetch] would just
    # repeat the cask name. The deprecated singular binary: form
    # is removed.
    repository:
      owner: PietroCoppola
      name: homebrew-tap
      # Token with repo scope on PietroCoppola/homebrew-tap (the default
      # GITHUB_TOKEN can't push to a different repo). Generated via
      # https://github.com/settings/tokens, stored as repo secret on
      # PietroCoppola/newsfetch named HOMEBREW_TAP_GITHUB_TOKEN. Surfaced
      # to the GoReleaser action via the env: block in release.yml.
      token: '{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}'
    homepage: 'https://github.com/PietroCoppola/newsfetch'
    description: 'A small CLI that prints one piece of bite-sized tech news every time you open a terminal.'
    license: MIT
    # Using homebrew_casks: instead of the deprecated brews:. GoReleaser
    # is phasing brews: out across all use cases including unsigned CLI
    # binaries (deprecation since v2.10, removal at v3.0). Casks are the
    # canonical path now even though the brew-conventional cask = GUI
    # framing predates this.
    #
    # Skip publishing the cask on pre-release tags (v0.4.6-pre1, etc.)
    # — those are pipeline tests, not real releases users should brew
    # install. Only stable tags update the tap.
    skip_upload: auto
    hooks:
      post:
        # Strip macOS Gatekeeper's quarantine attribute from the staged
        # binary. Without this, an unsigned Go binary triggers the
        # "newsfetch is damaged and can't be opened" dialog on first
        # run — a confusing failure mode for users who just ran a
        # successful brew install. Standard escape hatch for unsigned
        # CLIs distributed via Homebrew. staged_path resolves to the
        # versioned Caskroom directory; verified against the Cask
        # Cookbook DSL reference.
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/newsfetch"]
          end

release:
  draft: false
  # prerelease: auto detects tags matching pre-release semver patterns
  # (e.g. v0.4.6-pre1, v1.0.0-beta) and marks them as pre-releases on
  # GitHub. Lets us cut v0.4.6-pre1 for pipeline validation without
  # promoting it to "Latest release".
  prerelease: auto
  name_template: '{{ .ProjectName }} {{ .Version }}'
  footer: |
    ## Verifying

    Each archive's SHA-256 checksum is in `SHA256SUMS`. Verify with:

    ```
    sha256sum -c SHA256SUMS    # or `shasum -a 256 -c SHA256SUMS` on macOS
    ```

    No GPG / cosign signing yet — pre-1.0 project, the public checksum
    file is the integrity surface. May add signing later.
