name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  # actions/checkout@v4 and actions/setup-go@v5 still ship Node.js 20,
  # which GitHub is deprecating (forced to Node.js 24 starting 2026-06-02,
  # removed 2026-09-16). Opting in early silences the warning and is
  # forward-compatible. Drop this env var once we move to action versions
  # that ship Node.js 24 natively.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Unformatted files:"
            echo "$unformatted"
            exit 1
          fi
      - name: vet
        run: go vet ./...
      - name: build
        run: go build ./...
      - name: test
        run: go test ./...
